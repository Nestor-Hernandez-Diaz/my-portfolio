<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB","primary-hover": "#1d4ed8",
                        "background-dark": "#000000","surface-dark": "#050505",
                        "surface-glass": "rgba(255, 255, 255, 0.03)",
                        "border-glass": "rgba(255, 255, 255, 0.08)",
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "display": ["Plus Jakarta Sans", "sans-serif"]},
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                    animation: {
                        'marquee': 'marquee 45s linear infinite',
                        'drift-1': 'drift 60s linear infinite',
                        'drift-2': 'drift 90s linear infinite reverse',
                        'drift-3': 'drift 120s linear infinite',
                        'twinkle': 'twinkle 4s infinite ease-in-out',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-100%)' },
                        },
                        drift: {
                            '0%': { transform: 'translate(0, 0)' },
                            '100%': { transform: 'translate(-100px, -100px)' },},
                        twinkle: {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '1', transform: 'scale(1.2)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
        .glass-panel {
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .text-gradient-primary {
            background: linear-gradient(135deg, #ffffff 0%, #2563EB 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
        }.stars-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background-color: #000000;
        }
        .particle {
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            opacity: 0.8;
        }@keyframes driftData1 { from { transform: translate(0,0); } to { transform: translate(50px, -50px); } }
        @keyframes driftData2 { from { transform: translate(0,0); } to { transform: translate(-30px, 40px); } }
        @keyframes driftData3 { from { transform: translate(0,0); } to { transform: translate(20px, 60px); } }
        @keyframes driftData4 { from { transform: translate(0,0); } to { transform: translate(-60px, -20px); } }
        .particle:nth-child(4n+1) { animation: driftData1 40s linear infinite alternate, twinkle 3s ease-in-out infinite; }
        .particle:nth-child(4n+2) { animation: driftData2 55s linear infinite alternate, twinkle 5s ease-in-out infinite; }
        .particle:nth-child(4n+3) { animation: driftData3 45s linear infinite alternate, twinkle 4s ease-in-out infinite; }
        .particle:nth-child(4n+4) { animation: driftData4 60s linear infinite alternate, twinkle 6s ease-in-out infinite; }.star-sm { width: 1px; height: 1px; }
        .star-md { width: 2px; height: 2px; box-shadow: 0 0 2px rgba(255,255,255,0.8); }
        .star-lg { width: 3px; height: 3px; box-shadow: 0 0 4px rgba(255,255,255,0.9); }
    </style>
