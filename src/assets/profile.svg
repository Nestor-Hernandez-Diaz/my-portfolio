<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Accent circle -->
  <circle cx="400" cy="400" r="380" fill="url(#accent)" stroke="#2563EB" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Body silhouette (man) -->
  <ellipse cx="400" cy="290" rx="100" ry="110" fill="#334155"/>
  <path d="M 170 800 Q 170 550 400 520 Q 630 550 630 800 Z" fill="#334155"/>
  <!-- Label -->
  <text x="400" y="720" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif"
        font-size="18" font-weight="600" fill="#64748b">
    Tu foto aquí
  </text>
  <text x="400" y="748" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif"
        font-size="14" font-weight="400" fill="#475569">
    800 × 800px · formato cuadrado
  </text>
</svg>
